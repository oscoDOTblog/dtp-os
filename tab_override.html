<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dtp-os</title>
    <link rel="stylesheet" href="css/newtab.css">
</head>

<body>
    <div id="backgroundLayer" aria-hidden="true"></div>

    <div id="embedLayer" class="container is-visible">
        <iframe src="https://buildspace.so/home" title="Embedded home"></iframe>
    </div>

    <button
        type="button"
        id="shuffleBtn"
        class="shuffle-btn"
        hidden
        aria-label="Shuffle wallpaper"
        title="Shuffle wallpaper"
    >⟳</button>

    <button
        type="button"
        id="controlsToggle"
        class="controls-toggle"
        aria-label="Open wallpaper settings"
        aria-expanded="false"
        aria-controls="controls"
    >⚙</button>

    <aside id="controls" hidden>
        <h2 class="controls-header">Wallpapers</h2>
        <p class="controls-hint">
            Upload backgrounds and switch modes. In wallpaper mode, a random saved image appears each time you open a new tab. Use the shuffle button to change the background on this tab.
        </p>

        <div class="mode-toggle" role="group" aria-label="Display mode">
            <button type="button" id="modeWallpaper">Wallpaper</button>
            <button type="button" id="modeEmbed" class="is-active">Embedded site</button>
        </div>

        <label class="upload-label" for="fileInput">Upload images (JPEG, PNG, WebP)</label>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>

        <p id="galleryMeta" class="gallery-meta">0 saved · random on each new tab</p>
        <div id="gallery"></div>

        <p id="statusMessage" role="status" aria-live="polite"></p>
    </aside>

    <script type="module" src="js/newtab.js"></script>
</body>

</html>
