<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dtp-os</title>
    <link rel="icon" type="image/png" sizes="48x48" href="assets/48.png">
    <link rel="stylesheet" href="css/newtab.css">
</head>

<body>
    <div id="backgroundLayer" aria-hidden="true"></div>

    <div id="embedLayer" class="container is-visible">
        <iframe src="https://buildspace.so/home" title="Embedded home"></iframe>
    </div>

    <div id="greetingLayer" class="greeting-layer" aria-live="polite">
        <h1 id="appNameDisplay" class="greeting-app-name">dtp-os</h1>
        <p id="greetingMessage" class="greeting-message"></p>
    </div>

    <button
        type="button"
        id="shuffleBtn"
        class="shuffle-btn"
        hidden
        aria-label="Shuffle wallpaper"
        title="Shuffle wallpaper"
    >⟳</button>

    <button
        type="button"
        id="controlsToggle"
        class="controls-toggle"
        aria-label="Open settings"
        aria-expanded="false"
        aria-controls="settingsModal"
    >⚙</button>

    <div id="settingsModal" class="settings-modal" hidden>
        <div id="settingsBackdrop" class="settings-backdrop"></div>

        <div
            class="settings-dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="settingsDialogTitle"
        >
            <button
                type="button"
                id="settingsCloseBtn"
                class="settings-close-btn"
                aria-label="Close settings"
            >×</button>

            <section id="settingsListView" class="settings-view">
                <h2 id="settingsDialogTitle" class="settings-title">Settings</h2>
                <ul id="settingsList" class="settings-list" role="list"></ul>
            </section>

            <section id="settingsPanelView" class="settings-view" hidden>
                <header class="settings-panel-header">
                    <button
                        type="button"
                        id="settingsBackBtn"
                        class="settings-back-btn"
                        aria-label="Back to settings"
                    >←</button>
                    <h2 id="settingsPanelTitle" class="settings-panel-title"></h2>
                </header>
                <div id="settingsPanelContent" class="settings-panel-content"></div>
            </section>

            <p id="statusMessage" class="settings-status" role="status" aria-live="polite"></p>
        </div>
    </div>

    <script type="module" src="js/newtab.js"></script>
</body>

</html>
