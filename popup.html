<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dtp-os</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <section id="toolListView" class="view">
    <header class="popup-header">
      <h1 class="popup-title">dtp-os</h1>
    </header>
    <ul id="toolList" class="tool-list" role="list"></ul>
  </section>

  <section id="toolPanelView" class="view" hidden>
    <header class="tool-panel-header">
      <button type="button" id="backButton" class="back-button" aria-label="Back to tools">←</button>
      <h2 id="toolPanelTitle" class="tool-panel-title"></h2>
    </header>
    <div id="toolPanelContent" class="tool-panel-content"></div>
  </section>

  <script type="module" src="js/popup.js"></script>
</body>
</html>
